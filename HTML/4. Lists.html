<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>

<body>
    <h4> Unordered Lists </h4>
    <ul type="circle">
        <li>Item1</li>
        <li>Item2</li>
        <li>Item3</li>
    </ul>
    <h4> Ordered Lists </h4>
    <ol start='3' type="i">
        <li>Item1</li>
        <li>Item2</li>
        <li>Item3</li>
    </ol>

    <h4> Definition List </h4>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper text markup language.</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheet.</dd>
        <dt>JS</dt>
        <dd>JavaScript.</dd>
        <!-- Use case: Dictionary -->
    </dl>
</body>

</html>
